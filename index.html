    exp: "Estradiol elevado e mantido (>200 pg/mL por ~48h) inverte o feedback para positivo ⇒ pico de LH ⇒ ovulação." },
  { q: "A oxitocina está especialmente envolvida em:",
    opts: ["Contração uterina e ejeção do leite","Produção de leite por células mamárias","Aumento da glicemia em jejum","Produção de hormonas tiroideias"],
    correct: 0,
    exp: "Ejeção do leite (células mioepiteliais) e contração uterina no parto. A produção de leite é da prolactina." }
];

// --- Funções do quiz ---
let shuffledQuestions = [];

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderQuiz() {
  shuffledQuestions = shuffle(questions);
  const container = document.getElementById('quiz');
  container.innerHTML = '';

  shuffledQuestions.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.id = `q${idx}`;

    let html = `<h3><span class="qnum">${idx + 1}.</span>${item.q}</h3><div class="options">`;
    item.opts.forEach((opt, i) => {
      html += `
        <label id="q${idx}_opt${i}">
          <input type="radio" name="q${idx}" value="${i}">
          ${String.fromCharCode(65 + i)}. ${opt}
        </label>`;
    });
    html += `</div><div class="explanation" id="exp${idx}"></div>`;
    div.innerHTML = html;
    container.appendChild(div);
  });

  document.getElementById('result').className = '';
  document.getElementById('result').textContent = '';
}

function submitQuiz() {
  let score = 0;
  const total = shuffledQuestions.length;

  shuffledQuestions.forEach((item, idx) => {
    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
    const userIdx = selected ? parseInt(selected.value) : -1;

    // Limpar estilos anteriores
    item.opts.forEach((_, i) => {
      const lbl = document.getElementById(`q${idx}_opt${i}`);
      lbl.classList.remove('correct', 'incorrect');
    });

    // Marcar correta
    document.getElementById(`q${idx}_opt${item.correct}`).classList.add('correct');

    // Marcar errada se foi escolhida
    if (userIdx !== -1 && userIdx !== item.correct) {
      document.getElementById(`q${idx}_opt${userIdx}`).classList.add('incorrect');
    }

    if (userIdx === item.correct) score++;

    // Mostrar explicação
    const exp = document.getElementById(`exp${idx}`);
    exp.innerHTML = `<strong>Resposta correta: ${String.fromCharCode(65 + item.correct)}.</strong> ${item.exp}`;
    exp.classList.add('show');
  });

  const result = document.getElementById('result');
  const pct = Math.round((score / total) * 100);
  result.textContent = `Resultado: ${score} / ${total} (${pct}%)`;
  result.classList.add('show');
  result.classList.remove('score-good', 'score-mid', 'score-bad');
  if (pct >= 75)      result.classList.add('score-good');
  else if (pct >= 50) result.classList.add('score-mid');
  else                result.classList.add('score-bad');

  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function resetQuiz() {
  renderQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Inicializar
renderQuiz();
</script>
